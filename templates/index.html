<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ESSK SHOP | Steam Rep</title>
    <style>
        body {
            background: #0b0e11 url('https://community.cloudflare.steamstatic.com/public/images/profile/2020/bg_dot_grid.png');
            color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: #1b2838; padding: 30px; border-radius: 15px; border: 1px solid #2a475e; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #66c0f4; text-align: center; letter-spacing: 2px; }
        .pkg-grid { display: flex; gap: 15px; margin: 20px 0; }
        .pkg-option {
            flex: 1; background: #101822; border: 2px solid #2a475e; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .pkg-option { border-color: #66c0f4; background: rgba(102, 192, 244, 0.1); transform: scale(1.05); }
        .price { font-size: 22px; font-weight: bold; display: block; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px; background: #0d121a; border: 1px solid #2a475e; color: white; border-radius: 5px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; background: #66c0f4; border: none; color: #1b2838; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #66c0f4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESSK SHOP</h1>
        <form action="/trimite" method="POST">
            <div class="pkg-grid">
                <label style="flex:1">
                    <input type="radio" name="pachet" value="5_rep" checked>
                    <div class="pkg-option">
                        <span class="price">1 RON</span>
                        <small>5 +REP</small>
                    </div>
                </label>
                <label style="flex:1">
                    <input type="radio" name="pachet" value="25_rep">
                    <div class="pkg-option">
                        <span class="price">5 RON</span>
                        <small>25 +REP</small>
                    </div>
                </label>
            </div>
            <div class="input-group">
                <input type="email" name="email_utilizator" placeholder="Email contact" required>
            </div>
            <div class="input-group">
                <input type="text" name="steam_link" placeholder="Link Profil Steam" required>
            </div>
            <button type="submit" class="btn">CONTINUĂ LA PLATĂ</button>
        </form>
    </div>
</body>
</html>
