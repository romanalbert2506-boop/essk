<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESSK SHOP | Steam Rep</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0b0e11;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #1b2838;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #2a475e;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(102, 192, 244, 0.2);
            text-align: center;
        }

        .logo i { font-size: 50px; color: #66c0f4; margin-bottom: 15px; }
        h1 { margin: 0; color: #fff; letter-spacing: 1px; }
        .subtitle { color: #acb2b8; font-size: 14px; margin-bottom: 30px; }

        /* Pachete */
        .packages { display: flex; gap: 15px; margin-bottom: 25px; }
        .pkg {
            flex: 1;
            background: #101822;
            border: 2px solid #2a475e;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .pkg {
            border-color: #66c0f4;
            background: rgba(102, 192, 244, 0.1);
            transform: scale(1.05);
        }

        .pkg-price { font-size: 22px; font-weight: bold; display: block; }
        .pkg-desc { font-size: 12px; color: #66c0f4; font-weight: bold; }

        /* Formular */
        .field { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: #acb2b8; text-transform: uppercase; margin-left: 5px; }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            background: #0d121a;
            border: 1px solid #2a475e;
            color: white;
            border-radius: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #66c0f4;
            border: none;
            color: #0b0e11;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo"><i class="fab fa-steam"></i></div>
    <h1>ESSK SHOP</h1>
    <p class="subtitle">Alege pachetul de +REP</p>

    <form action="/trimite" method="POST">
        <div class="packages">
            <label style="flex:1">
                <input type="radio" name="pachet" value="5_rep" checked>
                <div class="pkg">
                    <span class="pkg-price">1 RON</span>
                    <span class="pkg-desc">5 +REP</span>
                </div>
            </label>
            <label style="flex:1">
                <input type="radio" name="pachet" value="25_rep">
                <div class="pkg">
                    <span class="pkg-price">5 RON</span>
                    <span class="pkg-desc">25 +REP</span>
                </div>
            </label>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" name="email_utilizator" placeholder="contact@me.com" required>
        </div>
        <div class="field">
            <label>Link Steam / ID</label>
            <input type="text" name="steam_link" placeholder="steamcommunity.com/id/..." required>
        </div>

        <button type="submit">CONTINUĂ LA PLATĂ</button>
    </form>
</div>

</body>
</html>
